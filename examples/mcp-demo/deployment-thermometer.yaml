apiVersion: apps/v1
kind: Deployment
metadata:
  name: deviceshifu-thermometer
  namespace: deviceshifu
  labels:
    app: deviceshifu-thermometer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deviceshifu-thermometer
  template:
    metadata:
      labels:
        app: deviceshifu-thermometer
    spec:
      containers:
      - name: deviceshifu-http
        image: edgehub/deviceshifu-http-http:nightly
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: deviceshifu-config
          mountPath: "/etc/edgedevice/config"
          readOnly: true
        env:
        - name: EDGEDEVICE_NAME
          value: "edgedevice-thermometer"
        - name: EDGEDEVICE_NAMESPACE
          value: "devices"
      volumes:
      - name: deviceshifu-config
        configMap:
          name: thermometer-configmap
---
apiVersion: v1
kind: Service
metadata:
  name: deviceshifu-thermometer
  namespace: deviceshifu
  labels:
    app: deviceshifu-thermometer
spec:
  selector:
    app: deviceshifu-thermometer
  ports:
  - port: 8080
    targetPort: 8080
