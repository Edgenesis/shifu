apiVersion: v1
kind: ConfigMap
metadata:
  name: socket-configmap-0.0.1
  namespace: deviceshifu
data:
  driverProperties: |
    driverSku: testSocket
    driverImage: 
  instructions: |
    connectionInfo: |
      Socket endpoint: deviceshifu-socket.deviceshifu.svc.cluster.local
      Protocol: TCP, Encoding: UTF-8, Buffer: 10 bytes
    instructions:
      cmd:
        readWrite: RW
        hasSideEffects: true
        riskLevel: RequireAttention
        description: |
          Send a raw command over the socket connection and receive a response.
  telemetries: |
    telemetrySettings:
      telemetryUpdateIntervalInMiliseconds: 1000
