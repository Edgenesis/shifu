apiVersion: shifu.edgenesis.io/v1alpha1
kind: EdgeDevice
metadata:
  name: edgedevice-robotarm
  namespace: devices
spec:
  sku: "Franka Emika"
  connection: Ethernet
  address: robotarm.devices.svc.cluster.local:11111
  protocol: HTTP
  description: |
    6-axis industrial robot arm (Franka Emika).
    Supports coordinate reading and health status monitoring.
  connectionInfo: |
    HTTP endpoint: http://deviceshifu-robot-arm.deviceshifu.svc.cluster.local
    Endpoints:
    - GET /get_coordinate → current joint positions
    - GET /get_status     → device health
