apiVersion: shifu.edgenesis.io/v1alpha1
kind: EdgeDevice
metadata:
  name: edgedevice-plc
  namespace: devices
spec:
  sku: "PLC"
  connection: Ethernet
  address: plc.devices.svc.cluster.local:11111
  protocol: HTTP
  description: |
    Programmable logic controller (PLC).
    Supports reading/writing registers and single-bit operations.
  connectionInfo: |
    HTTP endpoint: http://deviceshifu-plc.deviceshifu.svc.cluster.local
    Endpoints:
    - GET  /getcontent    → read register content
    - POST /sendcontent   → write register content
    - POST /sendsinglebit → write a single bit
    - GET  /get_status    → device health
