apiVersion: shifu.edgenesis.io/v1alpha1
kind: EdgeDevice
metadata:
  name: edgedevice-agv
  namespace: devices
spec:
  sku: "AGV"
  connection: Ethernet
  address: agv.devices.svc.cluster.local:11111
  protocol: HTTP
  description: |
    Quicktron M60 automated guided vehicle (AGV).
    Supports position tracking and health status monitoring.
  connectionInfo: |
    HTTP endpoint: http://deviceshifu-agv.deviceshifu.svc.cluster.local
    Endpoints:
    - GET /get_position → current AGV position
    - GET /get_status   → device health
  customMetadata:
    Vendor: Quicktron
    Type: AMR
    Model: M60
    LoadType: Lifting beneath rack
    HWrevision: v2
    Dimensions: 956*730*240 mm
    RatedLoad: Rated load
    BatteryCapacity: 48V/36Ah
    ChargingTime: 9h
    AmbientTemperature: 0-45C
