apiVersion: shifu.edgenesis.io/v1alpha1
kind: EdgeDevice
metadata:
  name: edgedevice-opcua
  namespace: devices
spec:
  sku: "opcua-test"
  connection: Ethernet
  address: opc.tcp://mockdevice-opcua.devices.svc.cluster.local:4840/freeopcua/server #change this accordingly
  protocol: OPCUA
  description: |
    OPC UA test server. Exposes numeric value nodes, a writable node,
    and server status nodes.
  connectionInfo: |
    OPC UA endpoint: opc.tcp://deviceshifu-opcua.deviceshifu.svc.cluster.local:4840
    Security mode: None, Authentication: Anonymous
  protocolSettings:
    OPCUASetting:
      SecurityMode: None
      ConnectionTimeoutInMilliseconds: 5000
      AuthenticationMode: Anonymous
