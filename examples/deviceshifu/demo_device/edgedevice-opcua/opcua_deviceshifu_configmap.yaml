apiVersion: v1
kind: ConfigMap
metadata:
  name: opcua-configmap-0.0.1
  namespace: deviceshifu
data:
  driverProperties: |
    driverSku: Test OPC UA Server
    driverImage:
  instructions: |
    instructions:
      get_value:
        readWrite: R
        safe: true
        description: |
          Read numeric value from OPC UA node ns=2;i=2.
        protocolPropertyList:
          OPCUANodeID: "ns=2;i=2"
      writable_value:
        readWrite: RW
        safe: false
        description: |
          Read or write numeric value at OPC UA node ns=2;i=3.
        protocolPropertyList:
          OPCUANodeID: "ns=2;i=3"
      get_time:
        readWrite: R
        safe: true
        description: |
          Read the server's current time from OPC UA node i=2258.
        protocolPropertyList:
          OPCUANodeID: "i=2258"
      get_server:
        readWrite: R
        safe: true
        description: |
          Read the server status from OPC UA node i=2261.
        protocolPropertyList:
          OPCUANodeID: "i=2261"
  telemetries: |
    telemetrySettings:
      telemetryUpdateIntervalInMiliseconds: 1000
    telemetries:
      device_health:
        properties:
          instruction: get_server
          initialDelayMs: 1000
          intervalMs: 1000
