name: Prepare Release Changelog

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      previous_tag:
        description: "Latest stable tag used as the changelog baseline."
        value: ${{ jobs.generate_changelog.outputs.previous_tag }}
      next_tag:
        description: "Next release tag generated by the changelog workflow."
        value: ${{ jobs.generate_changelog.outputs.next_tag }}
      pr_number:
        description: "Pull request number for the generated changelog PR."
        value: ${{ jobs.generate_changelog.outputs.pr_number }}
      pr_url:
        description: "Pull request URL for the generated changelog PR."
        value: ${{ jobs.generate_changelog.outputs.pr_url }}

permissions:
  contents: write
  pull-requests: write

jobs:
  generate_changelog:
    runs-on: ubuntu-latest
    outputs:
      previous_tag: ${{ steps.version.outputs.previous_tag }}
      next_tag: ${{ steps.version.outputs.next_tag }}
      pr_number: ${{ steps.create_pr.outputs.pull-request-number }}
      pr_url: ${{ steps.create_pr.outputs.pull-request-url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Determine next release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          source tools/release/automation.sh

          latest_tag="$(release_latest_stable_tag)"
          if [[ -z "${latest_tag}" ]]; then
            release_error "No stable semver tags found (expected vX.Y.Z)"
            exit 1
          fi

          next_tag="$(release_next_minor_version "${latest_tag}")"
          echo "previous_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          repo="${{ github.repository }}"
          previous_tag="${{ steps.version.outputs.previous_tag }}"
          next_tag="${{ steps.version.outputs.next_tag }}"

          response="$(curl -sSL -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${repo}/releases/generate-notes" \
            -d "$(jq -nc --arg tag "${next_tag}" --arg prev "${previous_tag}" --arg target "main" '{tag_name:$tag,target_commitish:$target,previous_tag_name:$prev}')")"

          if [[ -z "$(echo "${response}" | jq -r '.body // empty')" ]]; then
            echo "Failed to get release notes body from generate-notes API" >&2
            echo "${response}" >&2
            exit 1
          fi

          go run tools/release/release.go "${response}"

          echo "file=CHANGELOG/CHANGELOG-${next_tag}.md" >> "$GITHUB_OUTPUT"
        env:
          AZURE_OPENAI_APIKEY: ${{ secrets.AZURE_OPENAI_APIKEY }}
          AZURE_OPENAI_HOST: ${{ secrets.AZURE_OPENAI_HOST }}
          DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
          VERSION: ${{ steps.version.outputs.next_tag }}

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: add changelog for ${{ steps.version.outputs.next_tag }}"
          title: "chore: add changelog for ${{ steps.version.outputs.next_tag }}"
          body: "add changelog for ${{ steps.version.outputs.next_tag }}"
          branch: changelog-${{ steps.version.outputs.next_tag }}
          base: main
          delete-branch: true
          add-paths: |
            CHANGELOG/CHANGELOG-${{ steps.version.outputs.next_tag }}.md
